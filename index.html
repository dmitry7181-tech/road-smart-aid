<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обсуждение прав водителей</title>
    <style>
        .btn {
            background-color: #007bff;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать в Road Smart Aid</h1>
    <p>Информация о полицейских остановках, документах, авариях и правах водителей.</p>
    <button class="btn" aria-label="Проверить права водителя">Проверить права</button>
    <script>
        async function fetchData(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Ошибка: ${response.status}`);
                }
                const data = await response.json();
                console.log(data);
                // Обработайте данные здесь, если нужно
            } catch (error) {
                console.error('Ошибка при получении данных:', error);
                alert('Не удалось получить данные. Пожалуйста, попробуйте еще раз.');
            }
        }

        // Пример вызова функции fetchData с вашим URL
        fetchData('https://api.example.com/data');
    </script>
</body>
</html>
