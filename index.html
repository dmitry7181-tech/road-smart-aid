<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a56db">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <title>Road Smart Aid - Помощник водителя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #1a56db 0%, #0ea5e9 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border: none;
            color: white;
            padding: 15px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1a56db 0%, #0ea5e9 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc2626 0%, #f87171 100%);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border: 1px solid #888;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: #000;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            color: #1a56db;
        }
        
        .modal-content h3 {
            margin-top: 15px;
            margin-bottom: 10px;
            color: #0ea5e9;
        }
        
        .modal-content ul, .modal-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }
        
        .modal-content li {
            margin-bottom: 8px;
            line-height: 1.6;
        }
        
        .rights-section, .info-section {
            margin-bottom: 20px;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            margin-top: 40px;
            border-top: 1px solid #ddd;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 24px;
            }
            
            .buttons-grid {
                grid-template-columns: 1fr;
            }
            
            .btn {
                width: 100%;
                padding: 12px 20px;
                font-size: 16px;
            }
        }
        
        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
                color: #ffffff;
            }
            
            .modal-content {
                background-color: #2a2a2a;
                color: #ffffff;
            }
            
            footer {
                border-top-color: #444;
                color: #aaa;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🚗 Road Smart Aid</h1>
        <p>Ваш помощник на дороге</p>
    </header>
    
    <div class="container">
        <h2>Выберите интересующую информацию:</h2>
        
        <div class="buttons-grid">
            <button class="btn btn-primary" id="checkRightsBtn">📋 Проверить права</button>
            <button class="btn btn-warning" id="stopBtn">🚔 При остановке</button>
            <button class="btn btn-danger" id="accidentBtn">⚠️ При ДТП</button>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Информация</h2>
            <div id="modalContent"></div>
        </div>
    </div>
    
    <footer>
        <p>© 2024 Road Smart Aid. Все права защищены. | Используйте эту информацию в соответствии с законодательством РФ</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
