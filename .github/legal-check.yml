name: 🔍 Проверка актуальности законов

on:
  schedule:
    # Каждое воскресенье в 10:00 UTC (13:00 Москва)
    - cron: '0 10 * * 0'
  workflow_dispatch: # Можно запустить вручную через вкладку Actions

jobs:
  check-sources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v3
      
      - name: Проверка доступности источников
        id: check
        run: |
          echo "🔍 Проверка источников нормативной базы..."
          echo ""
          
          # Проверяем pravo.gov.ru
          if curl -s --head --request GET --max-time 30 "https://publication.pravo.gov.ru" > /dev/null; then
            echo "✅ publication.pravo.gov.ru доступен"
            echo "PRAVO_STATUS=up" >> $GITHUB_ENV
          else
            echo "❌ publication.pravo.gov.ru недоступен"
            echo "PRAVO_STATUS=down" >> $GITHUB_ENV
          fi
          
          # Проверяем consultant.ru
          if curl -s --head --request GET --max-time 30 "https://www.consultant.ru" > /dev/null; then
            echo "✅ consultant.ru доступен"
            echo "CONSULTANT_STATUS=up" >> $GITHUB_ENV
          else
            echo "❌ consultant.ru недоступен"
            echo "CONSULTANT_STATUS=down" >> $GITHUB_ENV
          fi
          
          # Проверяем garant.ru
          if curl -s --head --request GET --max-time 30 "https://www.garant.ru" > /dev/null; then
            echo "✅ garant.ru доступен"
            echo "GARANT_STATUS=up" >> $GITHUB_ENV
          else
            echo "❌ garant.ru недоступен"
            echo "GARANT_STATUS=down" >> $GITHUB_ENV
          fi
          
          echo ""
          echo "📊 Итоги проверки:"
          echo "   pravo.gov.ru: ${{ env.PRAVO_STATUS }}"
          echo "   consultant.ru: ${{ env.CONSULTANT_STATUS }}"
          echo "   garant.ru: ${{ env.GARANT_STATUS }}"
      
      - name: Создание Issue для проверки
        if: env.PRAVO_STATUS == 'up'
        uses: actions/github-script@v6
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            
            // Проверяем, есть ли уже открытое Issue с таким заголовком
            const existingIssues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              state: 'open',
              labels: 'legal-update'
            });
            
            // Если уже есть открытое Issue — не создаём новое
            const duplicateIssue = existingIssues.data.find(issue => 
              issue.title.includes('Проверка актуальности законов')
            );
            
            if (duplicateIssue) {
              console.log('ℹ️ Уже есть открытое Issue для проверки, новое не создаём');
              return;
            }
            
            // Создаём новое Issue
            const issue = await github.rest.issues.create({
              owner: owner,
              repo: repo,
              title: `📋 Проверка актуальности законов от ${today}`,
              body: `## 🔍 Еженедельная проверка нормативной базы\n\n` +
                    `**Дата проверки:** ${today}\n\n` +
                    `### ✅ Что нужно проверить:\n` +
                    `- [ ] Приказ МВД №264 от 02.05.2023\n` +
                    `- [ ] КоАП РФ (Глава 12)\n` +
                    `- [ ] Конституция РФ (ст. 23, 25, 27, 29, 45, 46)\n` +
                    `- [ ] ПДД РФ (Постановление №1090)\n\n` +
                    `### 📌 Источники для проверки:\n` +
                    `- [Pravo.gov.ru](https://publication.pravo.gov.ru)\n` +
                    `- [Consultant.ru](https://www.consultant.ru)\n` +
                    `- [Garant.ru](https://www.garant.ru)\n\n` +
                    `### 📝 После проверки:\n` +
                    `1. Откройте \`data/legal-base.json\`\n` +
                    `2. Обновите \`last_verified\` на текущую дату\n` +
                    `3. Если были изменения — обновите \`version\` и \`changelog\`\n` +
                    `4. Если есть обновления в законах — установите \`update_pending: true\`\n` +
                    `5. Сделайте commit с описанием изменений\n` +
                    `6. Закройте это Issue\n\n` +
                    `---\n` +
                    `*Автоматически создано GitHub Actions • [Настройки workflow](https://github.com/${owner}/${repo}/blob/main/.github/workflows/legal-check.yml)*`,
              labels: ['legal-update', 'priority-medium']
            });
            
            console.log('✅ Issue создан: #' + issue.data.number);
      
      - name: Уведомление если источники недоступны
        if: env.PRAVO_STATUS == 'down'
        uses: actions/github-script@v6
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Источники нормативной базы недоступны (${today})`,
              body: `## ❌ Критическая ошибка\n\n` +
                    `**Дата:** ${today}\n\n` +
                    `Официальный источник **publication.pravo.gov.ru** недоступен.\n\n` +
                    `### Возможные причины:\n` +
                    `- Технические работы на сайте\n` +
                    `- Временная блокировка\n` +
                    `- Изменение структуры сайта\n\n` +
                    `### Что делать:\n` +
                    `1. Проверьте доступность вручную\n` +
                    `2. Если сайт работает — возможно проблема в GitHub Actions\n` +
                    `3. Обновите ссылки в \`data/legal-base.json\` если URLs изменились\n\n` +
                    `---\n` +
                    `*Автоматически создано GitHub Actions*`,
              labels: ['critical', 'sources-down']
            });
            
            console.log('⚠️ Создано Issue о недоступности источников');
