name: Legal Update Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

# 🔥 Эта настройка включает поддержку нового Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run update script
        run: python .github/workflows/check.py

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/legal-base.json
          git commit -m "auto: update legal base" || echo "No changes to commit"
          git push
