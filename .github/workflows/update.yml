name: Проверка обновлений законов

on:
  schedule:
    - cron: '0 9 * * 1'  # Каждый понедельник в 12:00 МСК
  workflow_dispatch:     # Ручной запуск

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install requests
        run: pip install requests
      - name: Check legal updates
        run: |
          python3 << 'EOF'
          import requests, json, hashlib, os
          url = "https://publication.pravo.gov.ru/document/0001202305020028"
          try:
              resp = requests.get(url, timeout=10)
              new_hash = hashlib.sha256(resp.text.encode()).hexdigest()[:16]
              with open('data/legal-base.json', 'r', encoding='utf-8') as f:
                  db = json.load(f)
              old_hash = db['documents']['mvd_order_264'].get('content_hash', '')
              if new_hash != old_hash:
                  print(f"::warning::Найдено обновление!")
                  db['documents']['mvd_order_264']['content_hash'] = new_hash
                  db['metadata']['last_verified'] = "2026-03-30T00:00:00Z"
                  with open('data/legal-base.json', 'w', encoding='utf-8') as f:
                      json.dump(db, f, indent=2, ensure_ascii=False)
                  os.system('git config user.name "github-actions"')
                  os.system('git config user.email "actions@github.com"')
                  os.system('git add data/legal-base.json')
                  os.system('git commit -m "auto: обновление базы" || echo "No changes"')
                  os.system('git push')
              else:
                  print("✅ Всё актуально")
          except Exception as e:
              print(f"Ошибка: {e}")
          EOF 
